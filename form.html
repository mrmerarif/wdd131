<!DOCTYPE html>
<html lang="en">

    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">

        <title>WDD 131 | Dynamic Web Fundamentals | Merari Flores</title>

        <meta name="description"
            content="This Product Review Form lets users choose a product, rate it, select useful features, and submit a review. Created for WDD 131 Dynamic Web Fundamentals.">

        <meta name="author" content="Merari Flores">

        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;700&display=swap" rel="stylesheet">

        <link rel="stylesheet" href="styles/base.css">
        <link rel="stylesheet" href="styles/form.css">

        <script src="scripts/getdates.js" defer></script>
        <script src="scripts/form.js" defer></script>
    </head>

    <body>

        <header>
            <span id="course-title">WDD 131 | Dynamic Web Fundamentals</span>

            <h1>Product Review</h1>

            <nav>
                <a href="index.html">Home</a>
                <a href="about.html">About</a>
                <a href="form.html">Product Review</a>
                <a href="https://www.byui.edu">BYU-Idaho</a>
            </nav>
        </header>

        <main class="form-main">

            <section class="card">
                <p>This page contains the WDD131 Product Review Form.</p>
            </section>

            <section class="card">
                <p>Please complete the form below to submit your review.</p>
            </section>

            <form method="get" action="review.html" id="reviewForm">

                <label for="productName">Product Name</label>
                <select id="productName" name="productName" required>
                    <option value="" disabled selected>Select a Product ...</option>
                </select>

                <p>Overall Rating</p>

                <div class="rating-row">

                    <label class="rating-option" for="rating1">
                        <span class="stars">★</span>
                        <input type="radio" id="rating1" name="rating" value="1" required>
                    </label>

                    <label class="rating-option" for="rating2">
                        <span class="stars">★★</span>
                        <input type="radio" id="rating2" name="rating" value="2" required>
                    </label>

                    <label class="rating-option" for="rating3">
                        <span class="stars">★★★</span>
                        <input type="radio" id="rating3" name="rating" value="3" required>
                    </label>

                    <label class="rating-option" for="rating4">
                        <span class="stars">★★★★</span>
                        <input type="radio" id="rating4" name="rating" value="4" required>
                    </label>

                    <label class="rating-option" for="rating5">
                        <span class="stars">★★★★★</span>
                        <input type="radio" id="rating5" name="rating" value="5" required>
                    </label>

                </div>

                <label for="installDate">Date of Installation</label>
                <input type="date" id="installDate" name="installDate" required>

                <label>Which features did you find useful? <span class="optional">(check all that apply)</span></label>

                <div class="checkbox-group">

                    <label class="checkbox-item" for="feature1">
                        <input type="checkbox" id="feature1" name="features" value="durability">
                        <span>Durability</span>
                    </label>

                    <label class="checkbox-item" for="feature2">
                        <input type="checkbox" id="feature2" name="features" value="ease">
                        <span>Ease of Use</span>
                    </label>

                    <label class="checkbox-item" for="feature3">
                        <input type="checkbox" id="feature3" name="features" value="performance">
                        <span>Performance</span>
                    </label>

                    <label class="checkbox-item" for="feature4">
                        <input type="checkbox" id="feature4" name="features" value="design">
                        <span>Design</span>
                    </label>

                </div>

                <label for="reviewText">Written Review <span class="optional">(Optional)</span></label>
                <textarea id="reviewText" name="reviewText" rows="5"></textarea>

                <label for="userName">Your Name <span class="optional">(Optional)</span></label>
                <input type="text" id="userName" name="userName">

                <input type="submit" value="Post Review" class="submit-btn">

            </form>
        </main>

        <footer>
            <p>© <span id="currentyear"></span> Merari Flores – Utah, USA</p>
            <p id="lastmodified"></p>
        </footer>

    </body>

</html>
