<!DOCTYPE html>
<html lang="en">

    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Week 04 | Lazy Loading Images</title>
        <link rel="stylesheet" href="styles/styles.css">
    </head>

    <body>

        <header>
            <h1>Lazy Loading Image Demo</h1>
        </header>

        <main>
            <p>Scroll down slowly and watch when the images load in DevTools → Network.</p>

            <img src="https://picsum.photos/400/600?random=1" alt="Random image 1" width="400" height="600"
                loading="lazy" class="lazy-image">

            <img src="https://picsum.photos/400/600?random=2" alt="Random image 2" width="400" height="600"
                loading="lazy" class="lazy-image">

            <img src="https://picsum.photos/400/600?random=3" alt="Random image 3" width="400" height="600"
                loading="lazy" class="lazy-image">

            <img src="https://picsum.photos/400/600?random=4" alt="Random image 4" width="400" height="600"
                loading="lazy" class="lazy-image">

            <img src="https://picsum.photos/400/600?random=5" alt="Random image 5" width="400" height="600"
                loading="lazy" class="lazy-image">

            <img src="https://picsum.photos/400/600?random=6" alt="Random image 6" width="400" height="600"
                loading="lazy" class="lazy-image">
        </main>

        <footer>
            <p>Last modified: <span id="last-modified"></span></p>
        </footer>

        <script src="scripts/scripts.js"></script>
    </body>

</html>
