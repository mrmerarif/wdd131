<!DOCTYPE html>
<html lang="en">

    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Week 04 | Lazy Loading Images</title>
        <link rel="stylesheet" href="styles/styles.css">
    </head>

    <body>

        <header>
            <h1>Lazy Loading Image Demo</h1>
        </header>

        <main>
            <p>Scroll down slowly and watch when the images load in DevTools → Network.</p>

            <img src="https://via.placeholder.com/400x600?text=Image+1" alt="Placeholder image 1" width="400"
                height="600" loading="lazy" class="lazy-image">

            <img src="https://via.placeholder.com/400x600?text=Image+2" alt="Placeholder image 2" width="400"
                height="600" loading="lazy" class="lazy-image">

            <img src="https://via.placeholder.com/400x600?text=Image+3" alt="Placeholder image 3" width="400"
                height="600" loading="lazy" class="lazy-image">

            <img src="https://via.placeholder.com/400x600?text=Image+4" alt="Placeholder image 4" width="400"
                height="600" loading="lazy" class="lazy-image">

            <img src="https://via.placeholder.com/400x600?text=Image+5" alt="Placeholder image 5" width="400"
                height="600" loading="lazy" class="lazy-image">

            <img src="https://via.placeholder.com/400x600?text=Image+6" alt="Placeholder image 6" width="400"
                height="600" loading="lazy" class="lazy-image">
        </main>

        <footer>
            <p>Last modified: <span id="last-modified"></span></p>
        </footer>

        <script src="scripts/scripts.js"></script>
    </body>

</html>
